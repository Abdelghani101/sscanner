<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CaLMoviE — Ticket Scanner</title>
<style>
/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;-webkit-text-size-adjust:100%}

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .35s ease, transform .35s ease;
  opacity:0;pointer-events:none;transform:scale(.97);
  z-index:1;
}
.screen.active{opacity:1;pointer-events:all;transform:scale(1);z-index:10}

/* ── SCAN SCREEN ── */
#screen-scan{background:#000;z-index:5}

#video-el{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  transform:scaleX(-1); /* mirror front cam; ignored for rear */
}
#video-el.rear{transform:none}

/* Overlay gradient top + bottom */
.cam-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.65) 100%);
  pointer-events:none;
}

/* Viewfinder frame */
.vf-wrap{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:28px;
}
.vf-box{
  position:relative;
  width:clamp(240px,72vw,320px);
  height:clamp(240px,72vw,320px);
}
/* corner brackets */
.vf-box::before,.vf-box::after,
.vf-inner::before,.vf-inner::after{
  content:'';position:absolute;
  width:36px;height:36px;
  border-color:#d4af37;border-style:solid;
}
.vf-box::before { top:0;   left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
.vf-box::after  { top:0;   right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
.vf-inner::before{bottom:0;left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
.vf-inner::after {bottom:0;right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

/* scan line */
.scan-line{
  position:absolute;left:4%;right:4%;height:2px;
  background:linear-gradient(90deg,transparent,#d4af37,transparent);
  box-shadow:0 0 8px rgba(212,175,55,.8);
  animation:scanY 2s ease-in-out infinite;
  top:0;
}
@keyframes scanY{
  0%  {top:4%}
  50% {top:93%}
  100%{top:4%}
}

.vf-label{
  font-size:clamp(.75rem,3.5vw,.9rem);
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.8);text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}
.vf-title{
  font-size:clamp(1.1rem,5vw,1.5rem);
  font-weight:700;letter-spacing:5px;
  color:#d4af37;text-align:center;
  text-shadow:0 0 20px rgba(212,175,55,.6),0 2px 6px rgba(0,0,0,.9);
}

/* status dot */
.status-dot{
  width:10px;height:10px;border-radius:50%;
  background:#d4af37;
  box-shadow:0 0 8px rgba(212,175,55,.8);
  animation:pulse 1.4s ease-in-out infinite;
  display:inline-block;margin-right:6px;vertical-align:middle;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* camera error msg */
.cam-error{
  position:absolute;inset:0;z-index:3;
  background:#000;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:32px;gap:16px;text-align:center;
}
.cam-error.show{display:flex}
.cam-error-icon{font-size:3rem}
.cam-error-title{font-size:1.1rem;font-weight:700;color:#e74c3c;letter-spacing:2px}
.cam-error-msg{font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.6;max-width:300px}
.cam-error-btn{
  padding:12px 28px;background:#d4af37;border:none;border-radius:10px;
  color:#000;font-weight:700;font-size:.88rem;letter-spacing:2px;cursor:pointer;
  margin-top:8px;
}

/* ── RESULT SCREENS ── */
#screen-valid  { background:#0a2e0a; }
#screen-invalid{ background:#2e0a0a; }
#screen-used   { background:#1a1a00; }

.result-icon{
  font-size:clamp(4rem,18vw,7rem);
  line-height:1;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

.result-status{
  font-size:clamp(1.6rem,8vw,3rem);
  font-weight:900;
  letter-spacing:5px;
  text-transform:uppercase;
  margin:14px 0 6px;
  text-shadow:0 2px 12px rgba(0,0,0,.5);
  animation:slideUp .4s .1s both;
}
.result-sub{
  font-size:clamp(.7rem,3vw,.9rem);
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:.7;
  margin-bottom:28px;
  animation:slideUp .4s .15s both;
}
@keyframes slideUp{0%{transform:translateY(20px);opacity:0}100%{transform:none;opacity:1}}

#screen-valid   .result-status{ color:#4eff4e; }
#screen-invalid .result-status{ color:#ff4e4e; }
#screen-used    .result-status{ color:#ffee4e; }

/* ticket info card */
.ticket-card{
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.16);
  border-radius:16px;
  padding:20px 28px;
  max-width:340px;width:90%;
  text-align:left;
  animation:slideUp .4s .2s both;
}
.ticket-row{
  display:flex;justify-content:space-between;
  align-items:flex-start;gap:12px;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
  font-size:clamp(.72rem,3vw,.85rem);
}
.ticket-row:last-child{border-bottom:none}
.t-key{color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;font-size:.65rem;flex-shrink:0;padding-top:2px}
.t-val{color:#fff;font-weight:600;text-align:right;word-break:break-word}
.t-val.highlight{color:#4eff4e;font-family:monospace;font-size:.95rem;letter-spacing:2px}

/* already-used card */
.used-card{
  background:rgba(255,238,0,.08);
  border:1px solid rgba(255,238,0,.2);
  border-radius:16px;
  padding:20px 28px;
  max-width:340px;width:90%;
  text-align:center;
  animation:slideUp .4s .2s both;
}
.used-id{
  font-family:monospace;font-size:1.1rem;color:#ffee4e;
  letter-spacing:3px;margin-bottom:6px;
}
.used-time{font-size:.72rem;color:rgba(255,255,255,.5);letter-spacing:1px}

/* scan-again button */
.btn-scan-again{
  margin-top:22px;
  padding:13px 36px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  border-radius:30px;
  color:#fff;
  font-size:.82rem;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;
  transition:background .2s;
  animation:slideUp .4s .3s both;
}
.btn-scan-again:hover{background:rgba(255,255,255,.22)}

/* beep flash overlay */
.flash{
  position:fixed;inset:0;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .08s;
}
.flash.pop{opacity:.35;transition:none}
</style>
</head>
<body>

<!-- FLASH OVERLAY -->
<div class="flash" id="flash"></div>

<!-- ═══ SCAN SCREEN ═══ -->
<div class="screen active" id="screen-scan">
  <video id="video-el" autoplay muted playsinline></video>
  <div class="cam-overlay"></div>

  <!-- camera error -->
  <div class="cam-error" id="cam-error">
    <div class="cam-error-icon">📷</div>
    <div class="cam-error-title">Camera Unavailable</div>
    <div class="cam-error-msg" id="cam-error-msg">Camera access was denied or is unavailable on this device.</div>
    <button class="cam-error-btn" onclick="startCamera()">Try Again</button>
  </div>

  <div class="vf-wrap">
    <div class="vf-title">CaLMoviE</div>
    <div class="vf-box">
      <div class="vf-inner"></div>
      <div class="scan-line"></div>
    </div>
    <div class="vf-label">
      <span class="status-dot"></span>Scanning for ticket…
    </div>
  </div>
</div>

<!-- ═══ VALID SCREEN ═══ -->
<div class="screen" id="screen-valid">
  <div class="result-icon">✅</div>
  <div class="result-status">Valid Ticket</div>
  <div class="result-sub">Entry Approved</div>
  <div class="ticket-card" id="valid-card"></div>
  <button class="btn-scan-again" onclick="scanAgain()">▶ Scan Next</button>
</div>

<!-- ═══ INVALID SCREEN ═══ -->
<div class="screen" id="screen-invalid">
  <div class="result-icon">❌</div>
  <div class="result-status">Invalid Ticket</div>
  <div class="result-sub">Access Denied</div>
  <div class="ticket-card" style="text-align:center;padding:18px 28px">
    <div style="font-size:.82rem;color:rgba(255,255,255,.6);letter-spacing:1px;line-height:1.7">
      This QR code is not a valid<br>CaLMoviE ticket.
    </div>
    <div style="font-size:.7rem;color:rgba(255,100,100,.7);margin-top:10px;letter-spacing:1px" id="invalid-raw"></div>
  </div>
  <button class="btn-scan-again" onclick="scanAgain()">▶ Scan Again</button>
</div>

<!-- ═══ ALREADY USED SCREEN ═══ -->
<div class="screen" id="screen-used">
  <div class="result-icon">⚠️</div>
  <div class="result-status">Already Scanned</div>
  <div class="result-sub">Duplicate Entry</div>
  <div class="used-card" id="used-card"></div>
  <button class="btn-scan-again" onclick="scanAgain()">▶ Scan Again</button>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG — must match what config.js encodes into QR
   QR data format (pipe-separated):
   CaLMoviE|CM-CODE|BID|Name|Phone|Movie|Day Date|Time|NxType|TotalDA
═══════════════════════════════════════════════════ */
var CINEMA_NAME = 'CaLMoviE';   // must match first segment of QR

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
var videoStream   = null;
var scanning      = true;
var lastScanTime  = 0;
var detector      = null;
var scanInterval  = null;
var SCAN_COOLDOWN = 2500; // ms between scans (prevents double-fire)

/* ═══════════════════════════════════════════════════
   LOCAL STORAGE  — scanned ticket IDs
═══════════════════════════════════════════════════ */
var STORAGE_KEY = 'calmovie_scanned_tickets';

function getScanned() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e){ return {}; }
}

function markScanned(code, info) {
  var db = getScanned();
  db[code] = { time: new Date().toLocaleTimeString(), info: info };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){}
}

function wasScanned(code) {
  return !!getScanned()[code];
}

function getScannedRecord(code) {
  return (getScanned()[code]) || null;
}

/* ═══════════════════════════════════════════════════
   CAMERA
═══════════════════════════════════════════════════ */
function startCamera() {
  var errDiv = document.getElementById('cam-error');
  errDiv.classList.remove('show');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showCamError('Camera API not supported on this browser.');
    return;
  }

  // Try rear camera first, fall back to any
  var constraints = {
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .catch(function() {
      return navigator.mediaDevices.getUserMedia({ video: true });
    })
    .then(function(stream) {
      videoStream = stream;
      var vid = document.getElementById('video-el');
      // Detect if front camera (mirror it)
      var track = stream.getVideoTracks()[0];
      var settings = track ? track.getSettings() : {};
      if (settings.facingMode === 'user') {
        vid.classList.remove('rear');
      } else {
        vid.classList.add('rear');
      }
      vid.srcObject = stream;
      vid.play();
      vid.addEventListener('loadedmetadata', function() {
        initDecoder(vid);
      }, { once: true });
    })
    .catch(function(err) {
      var msg = err.name === 'NotAllowedError'
        ? 'Camera permission denied.\nPlease allow camera access in your browser settings and reload.'
        : 'Could not open camera: ' + err.message;
      showCamError(msg);
    });
}

function showCamError(msg) {
  var d = document.getElementById('cam-error');
  document.getElementById('cam-error-msg').textContent = msg;
  d.classList.add('show');
}

function stopCamera() {
  clearInterval(scanInterval);
  if (videoStream) {
    videoStream.getTracks().forEach(function(t) { t.stop(); });
    videoStream = null;
  }
}

/* ═══════════════════════════════════════════════════
   QR DECODER  —  BarcodeDetector (native) → jsQR fallback
═══════════════════════════════════════════════════ */
function initDecoder(vid) {
  scanning = true;

  if (typeof BarcodeDetector !== 'undefined') {
    // ── Native BarcodeDetector (Chrome 83+, Edge, Android, Safari 17+) ──
    detector = new BarcodeDetector({ formats: ['qr_code'] });
    scanInterval = setInterval(function() {
      if (!scanning) return;
      detector.detect(vid)
        .then(function(codes) {
          if (codes.length > 0) handleRaw(codes[0].rawValue);
        })
        .catch(function() {});
    }, 250);

  } else {
    // ── jsQR fallback (loaded dynamically) ──
    loadScript(
      'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js',
      function() {
        var canvas = document.createElement('canvas');
        var ctx    = canvas.getContext('2d');
        scanInterval = setInterval(function() {
          if (!scanning) return;
          if (vid.readyState < 2) return;
          canvas.width  = vid.videoWidth  || 640;
          canvas.height = vid.videoHeight || 480;
          ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
          var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var result  = jsQR(imgData.data, imgData.width, imgData.height, {
            inversionAttempts: 'dontInvert'
          });
          if (result) handleRaw(result.data);
        }, 200);
      },
      function() {
        // jsQR also failed — show manual entry
        showManualEntry();
      }
    );
  }
}

function loadScript(src, onSuccess, onError) {
  var s = document.createElement('script');
  s.src     = src;
  s.onload  = onSuccess;
  s.onerror = onError;
  document.head.appendChild(s);
}

/* ═══════════════════════════════════════════════════
   HANDLE RAW QR DATA
   Expected format:
   CaLMoviE|CM-1001-A7|BID123|John|0555|Movie|Day Date|Time|2xPouf|3000DA
═══════════════════════════════════════════════════ */
function handleRaw(raw) {
  if (!scanning) return;
  var now = Date.now();
  if (now - lastScanTime < SCAN_COOLDOWN) return;
  lastScanTime = now;
  scanning = false;

  clearInterval(scanInterval);
  triggerFlash();
  vibrate();

  var parts = raw.split('|');

  // Validate: must start with CINEMA_NAME and have enough segments
  if (parts.length < 10 || parts[0] !== CINEMA_NAME) {
    showInvalid(raw);
    return;
  }

  var ticketCode = parts[1]; // e.g. CM-1001-A7
  var bid        = parts[2]; // booking ID
  var name       = parts[3];
  var phone      = parts[4];
  var movie      = parts[5];
  var dayDate    = parts[6];
  var time       = parts[7];
  var seatsType  = parts[8];
  var total      = parts[9];

  // Check if already scanned
  if (wasScanned(ticketCode)) {
    var rec = getScannedRecord(ticketCode);
    showUsed(ticketCode, rec ? rec.time : '');
    return;
  }

  // Valid — mark and show
  var info = { name: name, movie: movie, dayDate: dayDate, time: time, seatsType: seatsType };
  markScanned(ticketCode, info);
  showValid({ code: ticketCode, bid: bid, name: name, phone: phone, movie: movie, dayDate: dayDate, time: time, seatsType: seatsType, total: total });
}

/* ═══════════════════════════════════════════════════
   SHOW SCREENS
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  var el = document.getElementById(id);
  if (el) {
    // small delay so animation triggers properly
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        el.classList.add('active');
      });
    });
  }
}

function showValid(t) {
  var card = document.getElementById('valid-card');
  card.innerHTML = row('Cinema',  CINEMA_NAME) +
                   row('Movie',   t.movie)     +
                   row('Day',     t.dayDate)   +
                   row('Time',    t.time)       +
                   row('Seats',   t.seatsType) +
                   row('Guest',   t.name)       +
                   row('Total',   t.total)      +
                   rowHighlight('Ticket ID', t.code);
  setFlashColor('#0a2e0a');
  showScreen('screen-valid');
  autoReturn(6000);
}

function showInvalid(raw) {
  var el = document.getElementById('invalid-raw');
  // Show a truncated version of the raw data
  el.textContent = raw.length > 60 ? raw.slice(0,57)+'…' : raw;
  setFlashColor('#2e0a0a');
  showScreen('screen-invalid');
  autoReturn(5000);
}

function showUsed(code, time) {
  var card = document.getElementById('used-card');
  card.innerHTML =
    '<div class="used-id">' + code + '</div>' +
    '<div class="used-time">First scanned at: ' + (time || 'earlier') + '</div>' +
    '<div style="font-size:.72rem;color:rgba(255,238,78,.6);margin-top:12px;letter-spacing:1px">This ticket has already been used for entry.</div>';
  setFlashColor('#2a2a00');
  showScreen('screen-used');
  autoReturn(5000);
}

function row(key, val) {
  return '<div class="ticket-row"><span class="t-key">' + key + '</span><span class="t-val">' + (val||'—') + '</span></div>';
}
function rowHighlight(key, val) {
  return '<div class="ticket-row"><span class="t-key">' + key + '</span><span class="t-val highlight">' + (val||'—') + '</span></div>';
}

/* Auto-return to scanner after N ms */
function autoReturn(ms) {
  setTimeout(function() { scanAgain(); }, ms);
}

function scanAgain() {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var sc = document.getElementById('screen-scan');
  sc.classList.add('active');
  lastScanTime = Date.now(); // small cooldown before re-scanning
  scanning = true;
  // restart interval if needed
  var vid = document.getElementById('video-el');
  if (vid.srcObject) {
    clearInterval(scanInterval);
    if (typeof BarcodeDetector !== 'undefined') {
      scanInterval = setInterval(function() {
        if (!scanning) return;
        detector.detect(vid).then(function(codes) {
          if (codes.length > 0) handleRaw(codes[0].rawValue);
        }).catch(function(){});
      }, 250);
    } else if (typeof jsQR !== 'undefined') {
      var canvas = document.createElement('canvas');
      var ctx    = canvas.getContext('2d');
      scanInterval = setInterval(function() {
        if (!scanning || vid.readyState < 2) return;
        canvas.width  = vid.videoWidth  || 640;
        canvas.height = vid.videoHeight || 480;
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var result  = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
        if (result) handleRaw(result.data);
      }, 200);
    }
  } else {
    startCamera();
  }
}

/* ═══════════════════════════════════════════════════
   FEEDBACK
═══════════════════════════════════════════════════ */
function triggerFlash() {
  var f = document.getElementById('flash');
  f.classList.add('pop');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { f.classList.remove('pop'); });
  });
}

function setFlashColor(color) {
  document.getElementById('flash').style.background = color;
}

function vibrate() {
  try { if (navigator.vibrate) navigator.vibrate([80, 40, 80]); } catch(e){}
}

/* ═══════════════════════════════════════════════════
   MANUAL ENTRY FALLBACK
   Shown only when no decoder is available at all
═══════════════════════════════════════════════════ */
function showManualEntry() {
  var vf = document.querySelector('.vf-wrap');
  if (!vf) return;
  vf.innerHTML =
    '<div class="vf-title" style="margin-bottom:6px">CaLMoviE</div>' +
    '<div class="vf-label" style="margin-bottom:16px">Auto-scan unavailable — enter code manually</div>' +
    '<input id="manual-in" style="background:rgba(0,0,0,.7);border:1px solid rgba(212,175,55,.5);' +
    'border-radius:10px;color:#fff;font-size:1.1rem;padding:14px 18px;width:260px;text-align:center;' +
    'outline:none;letter-spacing:3px;font-family:monospace;" placeholder="CM-1001-A7" />' +
    '<button onclick="handleManual()" style="margin-top:14px;padding:13px 30px;' +
    'background:#d4af37;border:none;border-radius:10px;color:#000;font-weight:700;' +
    'font-size:.9rem;letter-spacing:2px;cursor:pointer;">✅ Verify</button>';
}

function handleManual() {
  var val = (document.getElementById('manual-in') || {}).value || '';
  val = val.trim();
  if (!val) return;
  // Treat manual entry as a minimal valid-looking code check
  if (wasScanned(val)) {
    var rec = getScannedRecord(val);
    showUsed(val, rec ? rec.time : '');
  } else if (val.startsWith('CM-')) {
    markScanned(val, {});
    showValid({ code: val, bid:'', name:'Manual', phone:'', movie:'Verified', dayDate:'', time:'', seatsType:'', total:'' });
  } else {
    showInvalid(val);
  }
}

/* ═══════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════ */
startCamera();
</script>
</body>
</html>
